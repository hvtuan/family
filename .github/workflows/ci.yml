name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (astro check + astro build)
        run: pnpm build

      - name: Trigger Coolify deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK}" ]; then
            echo "::warning title=Coolify deploy skipped::COOLIFY_WEBHOOK secret not set."
            exit 0
          fi
          echo "Triggering Coolify webhook..."
          if [ -n "${COOLIFY_TOKEN}" ]; then
            curl -fsS --retry 3 --retry-delay 5 \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              -H "Accept: application/json" \
              "${COOLIFY_WEBHOOK}"
          else
            curl -fsS --retry 3 --retry-delay 5 \
              -H "Accept: application/json" \
              "${COOLIFY_WEBHOOK}"
          fi
          echo
          echo "Coolify deploy triggered."
