server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ─── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # ─── Hashed Astro assets: 1y immutable ────────────────────────────────────
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ─── Self-hosted fonts: 1y immutable, allow cross-origin ──────────────────
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        types { font/woff2 woff2; }
    }

    # ─── Textures and images in public/: 7d ──────────────────────────────────
    location /textures/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # ─── HTML: no cache (revalidate every request) ───────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ─── Clean URLs (Astro static: /family-tree → /family-tree/index.html) ───
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # ─── Block dotfiles ───────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
